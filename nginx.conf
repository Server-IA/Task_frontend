server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy al backend (red interna de Dokploy/Docker).
    # BACKEND_HOST se sustituye al iniciar el contenedor con el entrypoint.
    # En Dokploy, configurar la variable de entorno BACKEND_HOST con el App Name del backend.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $backend http://${BACKEND_HOST}:8080;
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
